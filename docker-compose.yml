services:
  portal:
    build: .
    image: ghcr.io/russrimm/microsoftcommunicationsportal:latest
    ports:
      - "3000:3000"
    env_file:
      - .env                          # optional — create from .env.example
    environment:
      - NODE_ENV=production
      - PORT=3000
      # ── M365 Message Center & Service Health (Entra app registration) ──
      # - M365_TENANT_ID=
      # - M365_CLIENT_ID=
      # - M365_CLIENT_SECRET=
      # ── Azure Service Health ──
      # - AZURE_SUBSCRIPTION_ID=
      # ── AI summaries (pick one provider) ──
      # Azure OpenAI
      # - AZURE_OPENAI_ENDPOINT=
      # - AZURE_OPENAI_API_KEY=
      # - AZURE_OPENAI_DEPLOYMENT=
      # - AZURE_OPENAI_API_VERSION=2024-10-21
      # OpenAI
      # - OPENAI_API_KEY=
      # - OPENAI_MODEL=gpt-4o-mini
      # GitHub Models
      # - GITHUB_TOKEN=
      # - GITHUB_MODEL=openai/gpt-4o-mini
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
